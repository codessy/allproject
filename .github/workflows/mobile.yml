name: mobile-ci

on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android platform scaffold
        run: flutter create . --platforms=android --project-name walkietalkie_mobile

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  runtime-deeplink-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ensure Android platform scaffold
        run: flutter create . --platforms=android --project-name walkietalkie_mobile

      - name: Install dependencies
        run: flutter pub get

      - name: Start backend dependencies
        run: docker compose -f ../infra/docker-compose.yml up -d

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API health check failed"
          exit 1

      - name: Build debug APK (dev flavor)
        run: flutter build apk --debug --flavor dev --dart-define-from-file=env/dev.json

      - name: Verify runtime deep-link on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: medium_phone
          script: |
            adb install -r mobile/build/app/outputs/flutter-apk/app-dev-debug.apk
            adb shell am start -n com.codessy.walkietalkie.dev/.MainActivity
            pwsh -File mobile/tool/verify_runtime_invite_deeplink.ps1 -ApiBaseUrl http://localhost:8080 -PackageName com.codessy.walkietalkie.dev -DeviceId emulator-5554

      - name: Stop backend dependencies
        if: always()
        run: docker compose -f ../infra/docker-compose.yml down -v
