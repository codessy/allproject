name: walkietalkie_mobile
description: Cross-platform walkie-talkie mobile client
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.6.0
  web_socket_channel: ^3.0.1
  flutter_webrtc: ^1.4.0
  livekit_client: ^2.7.0
  shared_preferences: ^2.3.2
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_async: ^1.3.1
  stream_channel: ^2.1.4

flutter:
  uses-material-design: true
